<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Elite Group Events - Contact">
  <meta name="author" content="Elite Group Events">
  <title data-lang-key="title-contact">Contact - Elite Group Events</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/ireme.js" defer></script>
</head>
<body>

  <header class="navbar">
    <div class="logo" data-lang-key="logo">Elite Group Events</div>

    <ul class="nav-links">
      <li><a href="index.html" data-lang-key="nav-home">Home</a></li>
      <li><a href="services.html" data-lang-key="nav-services">Services</a></li>
      <li><a href="events.html" data-lang-key="nav-events">Events</a></li>
      <li><a href="contact.html" data-lang-key="nav-contact">Contact</a></li>
    </ul>

    <div class="lang-switch">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="rw">RW</button>
    </div>
  </header>

  <section class="contact-section">
    <h2 data-lang-key="contact-title">Contact Us</h2>

    <form class="contact-form">

      <label for="name" data-lang-key="contact-name">Full Name</label>
      <input type="text" id="name" required data-lang-key-placeholder="placeholder-name" placeholder="Your Name">

      <label for="email" data-lang-key="contact-email">Email Address</label>
      <input type="email" id="email" required data-lang-key-placeholder="placeholder-email" placeholder="Your Email">

      <label for="message" data-lang-key="contact-message">Message</label>
      <textarea id="message" rows="5" required data-lang-key-placeholder="placeholder-message" placeholder="Write your message here..."></textarea>

      <button type="submit" data-lang-key="contact-btn">Send Message</button>
    </form>

    <div class="contact-info">
      <div>
        <h3 data-lang-key="contact-phone-title">Phone</h3>
        <p>+250 785 053 518</p>
      </div>

      <div>
        <h3 data-lang-key="contact-email-title">Email</h3>
        <p>info@elitegroupevents.rw</p>
      </div>

      <div>
        <h3 data-lang-key="contact-location-title">Location</h3>
        <p>Kigali, Rwanda</p>
      </div>
    </div>
  </section>

  <footer>
    © 2025 Elite Group Events. All rights reserved.
  </footer>

</body>
</html>
